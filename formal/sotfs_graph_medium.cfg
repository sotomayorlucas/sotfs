SPECIFICATION Spec

CONSTANTS
    InodeIds = {I1, I2, I3, I4, I5, I6}
    DirIds = {D1, D2, D3, D4}
    BlockIds = {B1, B2, B3, B4}
    Names = {a, b, c, d}
    MaxOps = 8

INVARIANTS
    TypeInvariant
    LinkCountConsistent
    UniqueNamesPerDir
    DirHasSelfRef
    NoDanglingEdges
    BlockRefcountConsistent
    NoDirCycles
    ReachableHaveLinks

CHECK_DEADLOCK FALSE
