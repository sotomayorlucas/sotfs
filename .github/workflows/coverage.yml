name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: cargo-llvm-cov + threshold
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
      - name: Install fuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3

      - name: Run cargo-llvm-cov on the workspace
        run: |
          cargo llvm-cov --workspace --lcov --output-path /tmp/lcov.info
          cargo llvm-cov report --summary-only | tee /tmp/cov.summary

      - name: Threshold gate
        run: |
          set -e
          line_pct=$(awk '/^TOTAL/{print $(NF-3)}' /tmp/cov.summary | tr -d '%')
          echo "[coverage] workspace line coverage = $line_pct%"
          awk -v p="$line_pct" 'BEGIN{exit !(p+0 >= 80)}' \
            || { echo "FAIL: coverage $line_pct% below 80%"; exit 1; }

      - name: Upload artifact
        if: always()
        env:
          ART_NAME: coverage-${{ github.sha }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ART_NAME }}
          path: |
            /tmp/lcov.info
            /tmp/cov.summary
