SPECIFICATION Spec

CONSTANTS
    SOIds = {S1, S2}
    MaxOps = 8

INVARIANTS
    TypeInvariant
    RecoveryConsistency
    NoPartialApplication
\* RollbackToSnapshot was subsumed by the (relaxed) RecoveryConsistency:
\* once Recover clears walCommitFlag, you can't differentiate "rolled
\* back" from "applied" via that flag alone, so the disjunctive form in
\* NoPartialApplication is the strongest invariant the variable set
\* supports without adding a history (ghost) variable. M9 may add one.

CONSTRAINT StateConstraint

CHECK_DEADLOCK FALSE
