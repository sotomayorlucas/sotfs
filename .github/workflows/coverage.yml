name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: cargo-llvm-cov + threshold + delta
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
      - name: Install fuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 attr

      - name: Run cargo-llvm-cov on the workspace
        run: |
          cargo llvm-cov --workspace --lcov --output-path /tmp/lcov.info
          cargo llvm-cov report --json --output-path /tmp/cov.json
          cargo llvm-cov report --summary-only | tee /tmp/cov.summary

      - name: Threshold gate (absolute floor 85% + max drop 2pp vs baseline)
        # Floor tightened from 80% → 85% in v0.2.5. The bump came
        # from the FUSE mount integration tests
        # (sotfs-fuse/tests/mount_integration.rs) which exercise the
        # actual FUSE callbacks against a live `/dev/fuse` mount —
        # `sotfs-fuse/src/fs.rs` went from 5% to ~79% line coverage,
        # carrying the workspace average from 80.10% to ~86%. The
        # mount tests are gated on `/dev/fuse` + `fusermount3` being
        # available on the runner; the CI job already installs
        # `fuse3` as part of the test step.
        run: |
          python scripts/coverage_gate.py \
            --cov-json /tmp/cov.json \
            --baseline docs/coverage-baseline.json \
            --layer workspace \
            --threshold-min 85 \
            --threshold-drop 2

      - name: Upload artifact
        if: always()
        env:
          ART_NAME: coverage-${{ github.sha }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ART_NAME }}
          path: |
            /tmp/lcov.info
            /tmp/cov.json
            /tmp/cov.summary
