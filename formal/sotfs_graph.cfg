SPECIFICATION Spec

\* M5 small smoke; *_medium.cfg / *_large.cfg drive deeper M9 nightly.
\* Original cardinalities (5/3/3/3, MaxOps=6) blew past 5 min on M5.
\* This trims to 3/2/2/2 and MaxOps=4 — TLC explores the same DPO
\* invariants but at ~10x lower state space. The medium cfg recovers
\* the full smoke depth.
CONSTANTS
    InodeIds = {I1, I2, I3}
    DirIds = {D1, D2}
    BlockIds = {B1, B2}
    Names = {a, b}
    MaxOps = 4

INVARIANTS
    TypeInvariant
    LinkCountConsistent
    UniqueNamesPerDir
    DirHasSelfRef
    NoDanglingEdges
    BlockRefcountConsistent
    NoDirCycles
    ReachableHaveLinks

CHECK_DEADLOCK FALSE
