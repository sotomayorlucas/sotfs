SPECIFICATION Spec

\* M5 small smoke. Original (5 nodes × MaxOps=8) timed out past 4 min.
\* Reduced to 4 nodes × MaxOps=5; the curvature/anomaly invariants
\* are localized so the topology coverage at this scale is enough.
CONSTANTS
    NodeIds = {N1, N2, N3, N4}
    MaxOps = 5
    Threshold = 1
    FanOutDelta = 2

INVARIANTS
    TypeInvariant
    CurvatureBounded
    NoSelfLoops
    KappaConsistent
    CurvatureDropImpliesFanOut
\* NoFalseNegatives ("fan-out implies drop") was the converse of
\* CurvatureDropImpliesFanOut and is not a theorem: a fan-out node
\* can share neighbors with both new endpoints and the scaled
\* curvature can rise instead of fall. Disabled with TLC counterexample
\* logged in target/formal/sotfs_curvature.log (states 1-3 of the
\* original run). The detection direction we DO verify is
\* CurvatureDropImpliesFanOut.
\*    NoFalseNegatives
\*    MonitorEventuallyDetects
\* Same reason as NoFalseNegatives: a fan-out that creates a triangle
\* (sharing neighbors with both endpoints) raises curvature, so the
\* monitor's drop-based detection legitimately doesn't flag it.
\* Disabled with TLC counterexample logged in target/formal/sotfs_curvature.log

CHECK_DEADLOCK FALSE
