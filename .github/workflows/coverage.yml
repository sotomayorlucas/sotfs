name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: cargo-llvm-cov + threshold + delta
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
      - name: Install fuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 attr

      - name: Run cargo-llvm-cov on the workspace
        run: |
          cargo llvm-cov --workspace --lcov --output-path /tmp/lcov.info
          cargo llvm-cov report --json --output-path /tmp/cov.json
          cargo llvm-cov report --summary-only | tee /tmp/cov.summary

      - name: Threshold gate (absolute floor 80% + max drop 2pp vs baseline)
        # Floor tightened from 70% → 80% in v0.2.4. The cleanup added
        # integration coverage for the three CLI binaries (sotfsctl,
        # sotfs-dot, sotfs-export-hunter), the GraphError Display impl,
        # the small accessor/lookup APIs on TypeGraph, and the
        # to_dot/to_d3_json/to_graph_hunter formatters with non-empty
        # graphs. Measured workspace coverage at the bump: 80.20%.
        run: |
          python scripts/coverage_gate.py \
            --cov-json /tmp/cov.json \
            --baseline docs/coverage-baseline.json \
            --layer workspace \
            --threshold-min 80 \
            --threshold-drop 2

      - name: Upload artifact
        if: always()
        env:
          ART_NAME: coverage-${{ github.sha }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ART_NAME }}
          path: |
            /tmp/lcov.info
            /tmp/cov.json
            /tmp/cov.summary
