SPECIFICATION Spec

\* M5 small smoke. Original (4 caps × 2 inodes × MaxOps=6) timed out
\* past 5 min. Reduced to 3 caps × 1 inode × 2 domains × MaxOps=4 —
\* covers attenuation/cascade-revoke/forgery invariants at full depth.
CONSTANTS
    CapIds = {C1, C2, C3}
    InodeIds = {I1}
    DomainIds = {D1, D2}
    MaxOps = 4

INVARIANTS
    TypeInvariant
    MonotonicAttenuation
    GrantsConsistency
    DelegationForest
    NoForgery
    TransitiveRevocation

CHECK_DEADLOCK FALSE
